<svg viewBox="0 0 64 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 顶部栏 -->
  <rect x="2" y="2" width="60" height="8" rx="2" fill="#006ae6" opacity="1"/>

  <!-- 汉堡按钮（左上角） -->
  <rect x="5" y="4" width="6" height="1.5" rx="0.75" fill="#ffffff" opacity="1"/>
  <rect x="5" y="6.5" width="6" height="1.5" rx="0.75" fill="#ffffff" opacity="1"/>
  <rect x="5" y="9" width="6" height="1.5" rx="0.75" fill="#ffffff" opacity="1"/>

  <!-- 主内容区域 -->
  <rect x="2" y="12" width="60" height="34" rx="2" fill="#ffffff" stroke="#006ae6" stroke-width="1"/>

  <!-- 内容条 -->
  <rect x="6" y="18" width="52" height="2" rx="1" fill="#006ae6" opacity="0.3"/>
  <rect x="6" y="23" width="40" height="2" rx="1" fill="#006ae6" opacity="0.3"/>
  <rect x="6" y="28" width="46" height="2" rx="1" fill="#006ae6" opacity="0.3"/>

  <!-- 抽屉菜单（从左侧滑出，半透明遮罩） -->
  <rect x="2" y="12" width="28" height="34" rx="2" fill="#006ae6" opacity="0.95"/>

  <!-- 抽屉菜单项 -->
  <rect x="6" y="18" width="20" height="2" rx="1" fill="#ffffff" opacity="1"/>
  <rect x="6" y="23" width="20" height="2" rx="1" fill="#ffffff" opacity="0.8"/>
  <rect x="6" y="28" width="20" height="2" rx="1" fill="#ffffff" opacity="0.8"/>
  <rect x="6" y="33" width="20" height="2" rx="1" fill="#ffffff" opacity="0.8"/>
  <rect x="6" y="38" width="14" height="2" rx="1" fill="#ffffff" opacity="0.8"/>
</svg>
